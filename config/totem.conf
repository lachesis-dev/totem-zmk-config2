CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="Totem Home"

# Re-bond cleanly after macOS wakes
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# macOS shows "Connected" after sleep/wake but sends NO keystrokes: on reconnect
# macOS often restores the link without re-subscribing to HID notifications (CCC).
# Recent Zephyr (we track revision: main in west.yml) enforces subscription and
# silently drops reports -> connected-but-dead keyboard. Disable enforcement so
# ZMK always sends HID reports, even if the host didn't re-subscribe on wake.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Deep sleep OFF. On macOS, deep sleep disconnects BLE and macOS won't cleanly
# re-bond on wake (forces a full re-pair) — this was the original disconnect.
# Connected-idle keeps the link alive across Mac sleep/wake. ~days-to-a-week battery.
CONFIG_ZMK_SLEEP=n

# Lazy connection params (Apple-compliant) to cut idle power while staying
# connected. Idle wake window ~= 60ms x (30+1) ~= 1.9s, within Apple's 2s cap.
# Typing stays instant (slave latency never delays the keyboard's own keypresses).
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=48
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=500

# Report battery level of BOTH split halves to the host (for Mighty Mitts)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

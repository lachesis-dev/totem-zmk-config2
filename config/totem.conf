CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="Totem Home"

# Re-bond cleanly after macOS wakes
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# Deep sleep OFF: wake-from-deep-sleep is broken on ZMK main / Zephyr 4.1 (#3207).
# Central can't reconnect after idle, so we stay in connected-idle instead.
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000  # inert while ZMK_SLEEP=n

# Report battery level of BOTH split halves to the host (for Mighty Mitts)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
